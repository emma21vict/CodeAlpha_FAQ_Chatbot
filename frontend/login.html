<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Secrétaire Virtuelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        :root[data-theme="light"] {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-blue: #4f46e5;
            --btn-bg: #0f172a;
            --btn-text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --bg-pattern: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
        }

        :root[data-theme="dark"] {
            --bg-color: #09090b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #8b5cf6;
            --btn-bg: #8b5cf6;
            --btn-text: #ffffff;
            --card-bg: rgba(24, 24, 27, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.3);
            --bg-pattern: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: var(--bg-pattern);
            background-size: 40px 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
            text-align: center;
        }

        .header-icon {
            color: var(--accent-blue);
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
        }
        
        .header-icon svg {
            width: 48px;
            height: 48px;
        }

        .title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        .btn-submit {
            width: 100%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 9999px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 24px;
            background: rgba(239, 68, 68, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1 class="title">Espace d'Administration</h1>
        <p class="subtitle">Connexion à votre environnement d'Intelligence Artificielle</p>

        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="input-group" style="margin-bottom: 20px;">
                <label for="email" style="margin-bottom: 8px; display: block;">Adresse Email</label>
                <input type="email" id="email" name="email" class="input-field" required placeholder="contact@entreprise.com">
            </div>
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="password" style="margin-bottom: 0;">Mot de passe sécurisé</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="back-link" style="margin-top: 0; font-size: 0.8rem; color: var(--accent-blue);">Mot de passe oublié ?</a>
                </div>
                <input type="password" id="password" name="password" class="input-field" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">
                Authentification
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
        
        <div style="margin-top: 24px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            Pas encore de compte ? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-blue); font-weight: 600; text-decoration: none;">S'inscrire</a>
        </div>
    </div>

    <script>
        // Apply saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
